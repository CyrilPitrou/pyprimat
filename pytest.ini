[pytest]
testpaths = tests
markers =
    slow: any test excluded from the default fast lane -- a full PyPRIMAT
        solve (or Monte-Carlo loop of solves), a weak-rate recompute
        (~1.8 s), or packaging checks; deselect with -m "not slow"
    solve: the "solve" tier (IDEAS.md sec 7.2): tests that run >=1 full
        PyPRIMAT solve at default (non-reference) precision, ~1 min total;
        always also marked "slow". CI runs default + solve on every push
        via -m "not slow or solve"
    reference: high-precision runs that pin the CLAUDE.md reference values to the
        published tolerances (~60 s total; select with -m reference, skip with -m "not reference")
    wheel: builds a wheel and installs it in a clean venv to smoke-test the
        "pip install" experience (package-data paths, etc.); also marked
        "slow" since it is excluded by -m "not slow"
    notebook: executes a demonstration notebook end-to-end with papermill
        (requires the optional "notebooks" extra; skipped if papermill is
        not installed); also marked "slow" since it is excluded by -m "not slow"
