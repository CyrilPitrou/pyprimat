# run_basic.ini -- minimal, heavily-commented template for a standalone
# primat-c run (KEY=VALUE syntax, one setting per line -- trailing
# same-line comments are NOT supported by cpr_ini_load, see src/ini.c).
# Copy this file and uncomment/edit whichever options you need; every
# option shown below is at its default value, so running this file
# unmodified reproduces the standard run (see ../../CLAUDE.md's
# "Validation before committing" table for the expected YPBBN/D-H
# reference values). Run from the repo root, or with an explicit
# --rates-dir, so the shipped rates/ data resolve correctly:
#
#   cd primat-c && make && ./build/cprimat --rates-dir ../primat --ini examples/run_basic.ini

# Omegabh2: baryon density x h^2 (Planck 2018 default)
# Omegabh2 = 0.022425

# DeltaNeff: extra relativistic species beyond SM neutrinos
# DeltaNeff = 0.0

# network: "small" / "small_parthenope" / "large" / custom network filename
network = small

# amax: filter any network to reactions with A <= amax
# amax = 8

# numerical_precision: rtol for all ODE solves
numerical_precision = 1e-7

# output_time_evolution: write the legacy per-step TSV (cfg.output_file);
# no unified-schema writer yet on the C side (PRIMAT.md S7.6)
# output_time_evolution = false

# user_rates_dir: overlay directory for your own network/table additions
# (PRIMAT.md S4.3)
# user_rates_dir = /path/to/your/overlay
