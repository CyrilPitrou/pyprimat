# run_basic.ini -- minimal, heavily-commented template for a standalone
# primat-c run (KEY=VALUE syntax, one setting per line -- trailing
# same-line comments are NOT supported by cpr_ini_load, see src/ini.c).
# Copy this file and uncomment/edit whichever options you need; every
# option shown below is at its default value, so running this file
# unmodified reproduces the standard run (see ../../CLAUDE.md's
# "Validation before committing" table for the expected YPBBN/D-H
# reference values). Run from the repo root, or with an explicit
# --data-dir, so the shipped data/ data resolve correctly:
#
#   cd primat-c && make && ./build/primat-c --rates-dir ../primat --ini examples/run_basic.ini
#
# Every key below mirrors a DEFAULT_PARAMS entry in ../../primat/config.py
# (see that file for more detailed physics comments); all 73 keys round-trip
# through cpr_config_set_by_name (primat-c/src/config.c's FIELD_TABLE), so
# any of them may be uncommented here.

# ---- general behaviour and numerical settings ------------------------------
# verbose: print primat-c's own progress messages
# verbose = false

# debug: print extra debug messages
# debug = false

# numerical_precision: rtol for all ODE solves
numerical_precision = 1e-7

# numba_installed: unused in C (no JIT path); kept for CLI/ini parity only
# numba_installed = true

# ---- neutrino decoupling ---------------------------------------------------
# incomplete_decoupling: true = NEVO non-instantaneous decoupling table;
# false = instantaneous decoupling
# incomplete_decoupling = true

# ---- electromagnetic plasma ------------------------------------------------
# QED_corrections: QED corrections to the EM plasma equation of state
# QED_corrections = true

# n_electron_table: grid points for the electron-thermo tables
# n_electron_table = 2000

# recompute_electron_thermo: force recomputation of the electron-thermo cache
# recompute_electron_thermo = false

# recompute_qed_corrections: force recomputation (and overwrite) of
# data/plasma/QED_*.txt
# recompute_qed_corrections = false

# ---- spectral distortions --------------------------------------------------
# spectral_distortions: n<->p rate corrections from non-Fermi-Dirac neutrino
# spectra
# spectral_distortions = true

# analytic_distortions: true = analytic y_SZ/y_gray distortion instead of the
# NEVO spectral table
# analytic_distortions = false

# y_SZ: amplitude of the y-type (Compton/SZ-like) distortion
# y_SZ = 0.0

# y_gray: amplitude of the gray-type (temperature-rescaling) distortion
# y_gray = 0.0

# ---- custom NEVO tables (unset = shipped default) --------------------------
# nevo_file: override the 6/7-column thermo table
# nevo_file = /path/to/your/nevo_thermo.csv

# nevo_spectral_file: override the 86-column spectral-distortion table
# nevo_spectral_file = /path/to/your/nevo_spectral.csv

# nevo_grid_file: override the y-grid for nevo_spectral_file
# nevo_grid_file = /path/to/your/nevo_grid.csv

# nevo_file_prefix: base filename for the default NEVO thermo/spectral tables
# nevo_file_prefix = NEVOPRIMAT

# ---- data directory override and nuclear overlay --------------------------
# data_dir: completely replace the shipped primat/data/ tree (must contain
# NEVO/, weak/, plasma/, nuclear/, csv/ subdirectories).  Also settable via
# the --data_dir CLI flag or the CPRIMAT_DATA_DIR environment variable.
# data_dir = /path/to/your/alternate/data

# user_nuclear_dir: additive overlay for nuclear networks and rate tables
# only (primat/data/nuclear/ equivalent; networks/ and tables/ directly
# inside).  Shipped networks remain accessible even when this is set.
# user_nuclear_dir = /path/to/your/nuclear/overlay

# ---- background mode -------------------------------------------------------
# external_scale_factor: read a(T_gamma) directly from the NEVO table's x
# column
# external_scale_factor = false

# custom_background: path to a user-supplied background file (T, t, a
# columns)
# custom_background = /path/to/your/background.tsv

# ---- fundamental constants (overridable for sensitivity studies) ----------
# GN: Newton's constant, SI [m^3 kg^-1 s^-2]
# GN = 6.674299257609439e-11

# ---- background thermodynamics ---------------------------------------------
# T_start_cosmo_MeV: starting temperature [MeV]
# T_start_cosmo_MeV = 40.0

# T_end_MeV: end temperature for nuclear integration [MeV]
# T_end_MeV = 1e-3

# sampling_temperature_per_decade: points per decade of T for the background
# a(T)/t(T) grid
# sampling_temperature_per_decade = 600

# ---- n <-> p weak rates -----------------------------------------------------
# radiative_corrections: Coulomb + T=0 resummed radiative corrections (CCR);
# false = Born approximation
# radiative_corrections = true

# finite_mass_corrections: Fokker-Planck finite-nucleon-mass correction
# finite_mass_corrections = true

# thermal_corrections: finite-temperature radiative corrections (CCRTh)
# thermal_corrections = true

# weak_rate_cache: if false, never load the weak-rate cache (always
# recompute)
# weak_rate_cache = true

# save_nTOp: save computed n<->p rates to data/weak/
# save_nTOp = true

# sampling_nTOp_per_decade: points per decade of T in the n<->p rate grid
# sampling_nTOp_per_decade = 80

# save_nTOp_thermal: save computed thermal n<->p rates to data/weak/
# save_nTOp_thermal = true

# sampling_nTOp_thermal_per_decade: points per decade of T for the
# thermal-correction table
# sampling_nTOp_thermal_per_decade = 20

# tau_n_normalization: normalise weak rates using the neutron lifetime tau_n
# tau_n_normalization = true

# tau_n: neutron lifetime [s]
# tau_n = 878.4

# std_tau_n: 1-sigma uncertainty on tau_n [s] (used for MC sampling)
# std_tau_n = 0.5

# vegas_n_eval, vegas_n_itn: unused on the C side (deterministic quadrature
# only); kept for CLI/ini parity
# vegas_n_eval = 20000
# vegas_n_itn = 20

# epsrel_thermal: dblquad fallback relative tolerance
# epsrel_thermal = 1e-2

# ---- output options ----------------------------------------------------------
# output_time_evolution: write the unified time-evolution TSV
# (cfg.output_file; PRIMAT.md S7.2/S7.6 -- same schema as the Python backend)
# output_time_evolution = false

# output_rates_time_evolution: include per-reaction nuclear-rate columns in
# the time-evolution TSV
# output_rates_time_evolution = false

# output_n_points: number of points in the time-evolution TSV
# output_n_points = 500

# output_file: path for output_time_evolution
# output_file = results/output_tables.tsv

# output_final_result: write a two-column (nuclide, Y) final-abundances file
# output_final_result = false

# output_final_file: path for output_final_result
# output_final_file = results/output_final.dat

# output_background_evolution: write the cosmological background's own
# time-evolution TSV
# output_background_evolution = false

# output_background_file: path for output_background_evolution
# output_background_file = results/output_background.tsv

# output_mc_samples: write every MC sample (cpr_mc_uncertainty) to a TSV, one
# column per quantity
# output_mc_samples = false

# output_mc_file: path for output_mc_samples
# output_mc_file = results/output_mc_samples.tsv

# ---- nuclear network --------------------------------------------------------
# rate_interp_order: nuclear rate table interpolation: "linear" / "quadratic"
# / "cubic"
# rate_interp_order = linear

# rate_grid_npts: points in the master T9 grid used to resample every rate
# table
# rate_grid_npts = 1000

# rate_grid_T9_min: minimum T9 [GK] of the master rate grid
# rate_grid_T9_min = 1e-3

# rate_grid_T9_max: maximum T9 [GK] of the master rate grid
# rate_grid_T9_max = 10.0

# network: "small" / "small_parthenope" / "large" / custom network filename
network = small

# amax: filter any network to reactions with A <= amax
# amax = 8

# atol_large_LT: solve_ivp absolute tolerance for the large-network LT era
# atol_large_LT = 1e-26

# rescale_nuclear_rates: vary all nuclear rates by a uniform factor
# (sensitivity studies)
# rescale_nuclear_rates = false

# mc_rate_rescale_cap: cap on the MC rate rescaling factor during Monte Carlo runs.
# The variation sigma^p + delta is clamped to [1/cap, cap] before multiplying the
# median rate.  Set to 0 to disable the cap (equivalent to Python None).
# mc_rate_rescale_cap = 30

# nuclear_qed_corrections: QED correction to select radiative-capture rates
# (Pitrou & Pospelov 2020)
# nuclear_qed_corrections = true

# ---- cosmological inputs -----------------------------------------------------
# Omegabh2: baryon density x h^2 (Planck 2018 default)
# Omegabh2 = 0.022425

# Omegach2: cold dark matter density Omega_c h^2 (Planck 2018)
# Omegach2 = 0.11933

# h: reduced Hubble constant h = H_0 / (100 km/s/Mpc) (Planck 2018)
# h = 0.6766

# DeltaNeff: extra relativistic species beyond SM neutrinos
# DeltaNeff = 0.0

# munuOverTnu: reduced neutrino chemical potential xi = mu/T
# munuOverTnu = 0.0

# ---- decay-era options -------------------------------------------------------
# decay_reverse_rates: compute detailed-balance reverse rates for
# radioactive decays
# decay_reverse_rates = false

# decay_era: run a 4th "Decay Time" era after LT (network=large only;
# decay-era execution itself is out of scope on the C side, CPLAN.md S0 --
# the flag is kept so cpr_config_set_by_name round-trips every key)
# decay_era = false

# t_decay_end: DT era duration [s] (default: 1 Gyr)
# t_decay_end = 3.156e16

# decay_n_points: log-spaced output points in the DT era
# decay_n_points = 200

# output_decay_evolution: write a TSV of the DT-era abundance time evolution
# output_decay_evolution = false

# output_decay_file: path for output_decay_evolution
# output_decay_file = results/output_decay_evolution.tsv

# ---- Early Dark Energy -------------------------------------------------------
# fEDE: EDE fraction at peak; 0 = disabled
# fEDE = 0.0

# zcEDE: redshift of EDE peak
# zcEDE = 1e8

# wnEDE: EDE equation-of-state parameter
# wnEDE = 1.0
